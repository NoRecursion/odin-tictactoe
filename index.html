<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-toe</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="icon.png">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>

    
    <svg style="display:none" fill="currentColor">
        <defs>    
            <symbol id="human" viewBox="0 0 24 24" fill="currentColor">
                <title>Human player</title>
                <path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z" />
            </symbol>

            <symbol id="bot" viewBox="0 0 24 24" fill="currentColor">
                <title>Computer</title>
                <path d="M12,2A2,2 0 0,1 14,4C14,4.74 13.6,5.39 13,5.73V7H14A7,7 0 0,1 21,14H22A1,1 0 0,1 23,15V18A1,1 0 0,1 22,19
                        H21V20A2,2 0 0,1 19,22H5A2,2 0 0,1 3,20V19H2A1,1 0 0,1 1,18V15A1,1 0 0,1 2,14H3A7,7 0 0,1 10,7
                        H11V5.73C10.4,5.39 10,4.74 10,4A2,2 0 0,1 12,2M7.5,13A2.5,2.5 0 0,0 5,15.5A2.5,2.5 0 0,0 7.5,18
                        A2.5,2.5 0 0,0 10,15.5A2.5,2.5 0 0,0 7.5,13M16.5,13A2.5,2.5 0 0,0 14,15.5A2.5,2.5 0 0,0 16.5,18
                        A2.5,2.5 0 0,0 19,15.5A2.5,2.5 0 0,0 16.5,13Z" />
            </symbol>
        </defs>
    </svg>

    <div class="topbar">
        <h1>Tic-Tac-Toe</h1>
    </div>
    <div class="content-container">
        <div class="player-box" id="p1-box">
            <h2 
                contenteditable="true"
                spellcheck="false"
                class="edit-me name"
            >
                Player 1
            </h2>

            <h3 class="score">Score: 0</h3>
            <h3 class="turn-marker"></h3>
            <div class="mark-x">
                <input type="color" class="hidden">
            </div>

            <div class="player-type-toggle">
                <div class="human">
                    <svg><use href="#human"/></svg>
                    Human
                </div>
                <div class="bot">
                    <svg><use href="#bot"/></svg>
                    CPU
                </div>
            </div>
        </div>

        <div class="game-box" id="game-box">
            

            <div class="grid-line column"></div>
            <div class="grid-line column"></div>
            <div class="grid-line row"></div>
            <div class="grid-line row"></div>

            <div class="play-area" id="play-area">
                <!--
                    <div class="win-line diagonal"></div>
                    <div class="win-line column"></div>
                    <div class="win-line row"></div>
                -->
            </div>

        </div>

        <div class="player-box" id="p2-box">
            <h2 
                contenteditable="true"
                spellcheck="false"
                class="edit-me name"
            >
                Player 2
            </h2>

            <h3 class="score">Score: 0</h3>
            <h3 class="turn-marker hidden"></h3>
            <div class="mark-o">
                <input type="color" class="hidden">
            </div>
            <div class="player-type-toggle">
                <div class="human">
                    <svg><use href="#human"/></svg>
                    Human
                </div>
                <div class="bot" hidden>
                    <svg><use href="#bot"/></svg>
                    CPU
                </div>
            </div>
        </div>
    </div>


</body>
</html>
