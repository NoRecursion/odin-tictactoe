<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-toe</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="icon.png">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="topbar">
        <h1>Tic-Tac-Toe</h1>
    </div>
    <div class="content-container">
        <div class="player-box" id="p1-box">
            <h2 
                contenteditable="true"
                spellcheck="false"
                class="edit-me name"
            >
                Player 1
            </h2>

            <h3 class="score">Score: 0</h3>
            <h3 class="turn-marker">Your turn</h3>
            <div class="mark-x">
                <input type="color" class="hidden">
            </div>
        </div>

        <div class="game-box" id="game-box">
            

            <div class="grid-line column"></div>
            <div class="grid-line column"></div>
            <div class="grid-line row"></div>
            <div class="grid-line row"></div>

            <div class="play-area" id="play-area">
                <!--
                    <div class="win-line diagonal"></div>
                    <div class="win-line column"></div>
                    <div class="win-line row"></div>
                -->
            </div>

        </div>

        <div class="player-box" id="p2-box">
            <h2 
                contenteditable="true"
                spellcheck="false"
                class="edit-me name"
            >
                Player 2
            </h2>

            <h3 class="score">Score: 0</h3>
            <h3 class="turn-marker hidden">Your turn</h3>
            <div class="mark-o">
                <input type="color" class="hidden">
            </div>
        </div>
    </div>


</body>
</html>
